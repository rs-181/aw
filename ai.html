<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>અમૃતમ AI સહાયક</title>
    <link rel="stylesheet" href="animations.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .ai-full-page {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px 20px;
        }
        .ai-chat-container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .ai-chat-header {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .ai-chat-header i {
            font-size: 50px;
            margin-bottom: 15px;
        }
        .ai-messages {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f9fafb;
        }
        .ai-input-area {
            display: flex;
            padding: 20px;
            border-top: 1px solid #e5e7eb;
        }
        .ai-input-area input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 15px;
            font-size: 16px;
        }
        .ai-input-area button {
            background: linear-gradient(135deg, #3b82f6, #1e3a8a);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 15px;
            margin-left: 10px;
            cursor: pointer;
            font-weight: 600;
        }
        .bot-msg {
            background: #eff6ff;
            padding: 12px 18px;
            border-radius: 18px;
            margin-bottom: 15px;
            max-width: 80%;
            color: #1e3a8a;
        }
        .user-msg {
            background: #3b82f6;
            color: white;
            padding: 12px 18px;
            border-radius: 18px;
            margin-bottom: 15px;
            margin-left: auto;
            max-width: 80%;
            text-align: right;
        }
        @media (max-width: 768px) {
            .bot-msg, .user-msg { max-width: 95%; }
        }
    </style>
</head>
<body>
    <nav class="premium-nav">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-tint"></i>
                <span>અમૃતમ વોટર</span>
            </div>
            <div class="nav-links">
                <a href="index.html">હોમ</a>
                <a href="amrutam.html">અમારા વિશે</a>
                <a href="ai.html">AI સહાયક</a>
            </div>
        </div>
    </nav>

    <div class="ai-full-page">
        <div class="ai-chat-container">
            <div class="ai-chat-header">
                <i class="fas fa-brain"></i>
                <h2>અમૃતમ AI સહાયક</h2>
                <p>તમારા પ્રશ્નોના જવાબો 24/7</p>
            </div>
            <div id="aiMessages" class="ai-messages">
                <div class="bot-msg">
                    <i class="fas fa-robot"></i> નમસ્તે! હું અમૃતમ AI સહાયક છું. હું તમને ભાવ, ઓર્ડર, ડિલિવરી, સમય અને અન્ય કોઈપણ માહિતી આપી શકું છું. કૃપા કરીને પૂછો.
                </div>
            </div>
            <div class="ai-input-area">
                <input type="text" id="aiInput" placeholder="તમારો પ્રશ્ન અહીં લખો...">
                <button id="aiSendBtn"><i class="fas fa-paper-plane"></i> મોકલો</button>
            </div>
        </div>
    </div>

    <footer class="premium-footer">
        <div class="container">
            <div class="footer-bottom">
                <p>© 2026 અમૃતમ વોટર સપ્લાયસ. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        const aiMessages = document.getElementById('aiMessages');
        const aiInput = document.getElementById('aiInput');
        const aiSendBtn = document.getElementById('aiSendBtn');

        function getAIResponse(question) {
            const q = question.toLowerCase();
            
            if (q.includes('ભાવ') || q.includes('કિંમત') || q.includes('price')) {
                return "📊 **ભાવ સૂચિ:**\n\n**20 લિટર બોટલ:**\n• નિયમિત ગ્રાહક: ₹15 (મફત ડિલિવરી)\n• જથ્થાબંધ: ₹20\n\n**કોલ્ડ જાર:**\n• નિયમિત ગ્રાહક: ₹35 (મફત ડિલિવરી)\n• જથ્થાબંધ: ₹45";
            }
            if (q.includes('ઓર્ડર') || q.includes('order')) {
                return "🛒 **ઓર્ડર કરવા માટે:**\n\n1️⃣ WhatsApp બટન દબાવો\n2️⃣ અથવા +91 95379 06611 પર કૉલ કરો\n3️⃣ અથવા ઉત્પાદનની નીચે આપેલ 'WhatsApp પર ઓર્ડર કરો' બટન દબાવો";
            }
            if (q.includes('મફત ડિલિવરી') || q.includes('free delivery')) {
                return "🚚 **મફત ડિલિવરી:**\n\n✅ નિયમિત ગ્રાહકો માટે સંપૂર્ણ મફત ડિલિવરી\n❌ જથ્થાબંધ ઓર્ડર પર ડિલિવરી ચાર્જ લાગુ પડે છે";
            }
            if (q.includes('સમય') || q.includes('time')) {
                return "⏰ **સેવા સમય:**\n\n• સવારે 6:00 થી સાંજે 4:00\n• રવિવારે પણ સેવા ઉપલબ્ધ";
            }
            if (q.includes('આદર') || q.includes('respect')) {
                return "🙏 **સ્ટાફ પ્રત્યેનો આદર:**\n\nઅમારા સ્ટાફ સાથે અપમાનજનક ભાષા, મારામારી અથવા અભદ્ર વર્તન બિલકુલ સહન કરવામાં આવશે નહીં. અપમાન કરનાર ગ્રાહકની સેવા તાત્કાલિક બંધ કરવામાં આવશે.";
            }
            if (q.includes('મોરબી') || q.includes('delivery area')) {
                return "📍 **ડિલિવરી એરિયા:**\n\n• મોરબી સિટી (તમામ વોર્ડ)\n• જયભાવની નગર, લાખા પાટી\n• ગુંદાસર રોડ, 80 ફૂટ રોડ\n• ટ્રાન્સપોર્ટ નગર, મકાન નગર";
            }
            return "🙏 આપના પ્રશ્ન માટે આભાર. વધુ માહિતી માટે +91 95379 06611 પર સંપર્ક કરો.";
        }

        function addBotMessage(text) {
            const div = document.createElement('div');
            div.className = 'bot-msg';
            div.innerHTML = `<i class="fas fa-robot"></i> ${text.replace(/\n/g, '<br>')}`;
            aiMessages.appendChild(div);
            aiMessages.scrollTop = aiMessages.scrollHeight;
        }

        function addUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'user-msg';
            div.innerHTML = `<i class="fas fa-user"></i> ${text}`;
            aiMessages.appendChild(div);
            aiMessages.scrollTop = aiMessages.scrollHeight;
        }

        function sendMessage() {
            const msg = aiInput.value.trim();
            if (!msg) return;
            addUserMessage(msg);
            aiInput.value = '';
            setTimeout(() => {
                const response = getAIResponse(msg);
                addBotMessage(response);
            }, 300);
        }

        aiSendBtn.addEventListener('click', sendMessage);
        aiInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
