<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>2048 · RS Digital Ecosystem</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body, html {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
    }

    /* Main App Container */
    #app {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Page System */
    .page {
      position: absolute;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.4s ease, visibility 0.4s;
    }

    .page.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* ========== WELCOME PAGE ========== */
    .welcome-container {
      max-width: 500px;
      width: 90%;
      text-align: center;
      padding: 40px 30px;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 48px;
      border: 1px solid rgba(56, 189, 248, 0.2);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(14, 165, 233, 0.1);
    }

    .game-title {
      font-size: 5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #7dd3fc, #38bdf8, #0284c7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 40px rgba(56, 189, 248, 0.5);
      margin-bottom: 10px;
    }

    .rs-badge {
      display: inline-block;
      background: rgba(2, 132, 199, 0.3);
      backdrop-filter: blur(10px);
      padding: 8px 24px;
      border-radius: 50px;
      color: #7dd3fc;
      font-weight: 500;
      letter-spacing: 2px;
      border: 1px solid #0ea5e9;
      margin-bottom: 30px;
    }

    .welcome-buttons {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin: 30px 0;
    }

    .btn {
      padding: 18px 32px;
      font-size: 1.3rem;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #0284c7, #0369a1);
      color: white;
      box-shadow: 0 10px 25px rgba(2, 132, 199, 0.4), 0 0 0 1px #38bdf8 inset;
    }

    .btn-primary:hover {
      transform: scale(0.98);
      box-shadow: 0 5px 15px rgba(2, 132, 199, 0.5);
    }

    .btn-secondary {
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(10px);
      color: #94a3b8;
      border: 1px solid #334155;
    }

    .btn-secondary:hover {
      background: rgba(51, 65, 85, 0.9);
      color: #cbd5e1;
    }

    .secret-hint {
      margin-top: 30px;
      color: #475569;
      font-size: 0.85rem;
      border-top: 1px solid #1e293b;
      padding-top: 20px;
    }

    /* ========== GAME PAGE ========== */
    .game-container {
      max-width: 550px;
      width: 95%;
      margin: 0 auto;
    }

    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .game-header h2 {
      color: #7dd3fc;
      font-size: 2rem;
    }

    .score-area {
      display: flex;
      gap: 15px;
    }

    .score-box {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(10px);
      padding: 12px 20px;
      border-radius: 20px;
      text-align: center;
      border: 1px solid #0ea5e9;
    }

    .score-label {
      color: #94a3b8;
      font-size: 0.8rem;
      text-transform: uppercase;
    }

    .score-value {
      color: #f0f9ff;
      font-size: 1.8rem;
      font-weight: 700;
    }

    /* Perfect Square Grid */
    .grid-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(15px);
      border-radius: 24px;
      padding: 15px;
      border: 1px solid #0ea5e9;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      width: 100%;
      height: 100%;
    }

    .tile {
      aspect-ratio: 1 / 1;
      width: 100%;
      height: 100%;
      background: #1e293b;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 2.2rem;
      color: white;
      transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    /* Tile Colors */
    .tile-2 { background: #eee4da; color: #776e65; }
    .tile-4 { background: #ede0c8; color: #776e65; }
    .tile-8 { background: #f2b179; color: #f9f6f2; }
    .tile-16 { background: #f59563; color: #f9f6f2; }
    .tile-32 { background: #f67c5f; color: #f9f6f2; }
    .tile-64 { background: #f65e3b; color: #f9f6f2; }
    .tile-128 { background: #edcf72; color: #f9f6f2; box-shadow: 0 0 15px #edcf72; }
    .tile-256 { background: #edcc61; color: #f9f6f2; box-shadow: 0 0 15px #edcc61; }
    .tile-512 { background: #edc850; color: #f9f6f2; box-shadow: 0 0 20px #edc850; }
    .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 1.8rem; box-shadow: 0 0 20px #edc53f; }
    .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 1.8rem; box-shadow: 0 0 30px #ffd700; }

    .game-controls {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .game-btn {
      padding: 12px 24px;
      background: #1e293b;
      color: #94a3b8;
      border: 1px solid #334155;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
    }

    .game-btn:hover {
      background: #334155;
      color: #cbd5e1;
    }

    .message-bar {
      text-align: center;
      margin-top: 15px;
      color: #7dd3fc;
      font-weight: 500;
    }

    /* Back button */
    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(10px);
      padding: 10px 20px;
      border-radius: 30px;
      color: #7dd3fc;
      border: 1px solid #0ea5e9;
      cursor: pointer;
      z-index: 10;
    }

    /* How to Play Modal */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: 0.3s;
    }

    .modal.show {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: #0f172a;
      padding: 30px;
      border-radius: 30px;
      max-width: 400px;
      width: 90%;
      border: 1px solid #0ea5e9;
      color: #cbd5e1;
    }

    .modal-content h3 {
      color: #7dd3fc;
      margin-bottom: 20px;
    }

    .modal-content button {
      margin-top: 20px;
      padding: 12px 30px;
      background: #0284c7;
      border: none;
      border-radius: 20px;
      color: white;
      cursor: pointer;
    }

    .cheat-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(2, 132, 199, 0.9);
      color: white;
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: 600;
      backdrop-filter: blur(10px);
      z-index: 2000;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .cheat-toast.show {
      opacity: 1;
    }

    /* Responsive */
    @media (max-width: 500px) {
      .tile { font-size: 1.8rem; }
      .tile-1024, .tile-2048 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Welcome Page -->
    <div class="page" id="welcomePage">
      <div class="welcome-container">
        <div class="game-title">2048</div>
        <div class="rs-badge">⚡ RS DIGITAL ECOSYSTEM ⚡</div>
        
        <div class="welcome-buttons">
          <button class="btn btn-primary" id="playNowBtn">▶ PLAY NOW</button>
          <button class="btn btn-secondary" id="howToPlayBtn">📖 HOW TO PLAY</button>
        </div>
        
        <div class="secret-hint">
          Created By : Rehan Sandhi
        </div>
      </div>
    </div>

    <!-- Game Page -->
    <div class="page hidden" id="gamePage">
      <div class="back-btn" id="backToWelcome">← Back</div>
      
      <div class="game-container">
        <div class="game-header">
          <h2>2048</h2>
          <div class="score-area">
            <div class="score-box">
              <div class="score-label">Score</div>
              <div class="score-value" id="scoreDisplay">0</div>
            </div>
            <div class="score-box">
              <div class="score-label">Best</div>
              <div class="score-value" id="bestDisplay">0</div>
            </div>
          </div>
        </div>

        <div class="grid-wrapper">
          <div class="grid" id="gridContainer"></div>
        </div>

        <div class="game-controls">
          <button class="game-btn" id="newGameBtn">🔄 New Game</button>
        </div>

        <div class="message-bar" id="gameMessage">
          Use Arrow Keys or WASD
        </div>
      </div>
    </div>

    <!-- How to Play Modal -->
    <div class="modal" id="howToModal">
      <div class="modal-content">
        <h3>🎮 How to Play</h3>
        <p>• Use <strong>Arrow Keys</strong> or <strong>WASD</strong> to move tiles</p>
        <p>• Combine same numbers to reach 2048</p>
        <p>• Each move adds a new tile (2 or 4)</p>
        <br>
        <button id="closeModalBtn">Got it!</button>
      </div>
    </div>

    <!-- Cheat Toast -->
    <div class="cheat-toast" id="cheatToast">✨ Cheat Activated!</div>
  </div>

  <script>
    (function(){
      "use strict";

      // ========== GAME STATE ==========
      const SIZE = 4;
      let board = [];
      let score = 0;
      let best = 0;
      let gameOver = false;
      
      // DOM Elements
      const welcomePage = document.getElementById('welcomePage');
      const gamePage = document.getElementById('gamePage');
      const gridEl = document.getElementById('gridContainer');
      const scoreDisplay = document.getElementById('scoreDisplay');
      const bestDisplay = document.getElementById('bestDisplay');
      const gameMessage = document.getElementById('gameMessage');
      const howToModal = document.getElementById('howToModal');
      const cheatToast = document.getElementById('cheatToast');

      // Load best score
      try {
        const saved = localStorage.getItem('rs2048_best');
        if (saved) best = parseInt(saved) || 0;
      } catch(e) {}
      
      function updateBest(value) {
        if (value > best) {
          best = value;
          try { localStorage.setItem('rs2048_best', best); } catch(e) {}
        }
        bestDisplay.textContent = best;
      }

      // Initialize empty board
      function emptyBoard() {
        return Array(SIZE).fill().map(() => Array(SIZE).fill(0));
      }

      // Add random tile
      function addRandomTile(brd) {
        const empty = [];
        for (let r = 0; r < SIZE; r++) {
          for (let c = 0; c < SIZE; c++) {
            if (brd[r][c] === 0) empty.push([r, c]);
          }
        }
        if (empty.length === 0) return false;
        const [r, c] = empty[Math.floor(Math.random() * empty.length)];
        brd[r][c] = Math.random() < 0.9 ? 2 : 4;
        return true;
      }

      // Initialize game
      function initGame() {
        board = emptyBoard();
        score = 0;
        gameOver = false;
        addRandomTile(board);
        addRandomTile(board);
        renderBoard();
        gameMessage.textContent = 'Use Arrow Keys or WASD';
      }

      // Render grid
      function renderBoard() {
        gridEl.innerHTML = '';
        for (let r = 0; r < SIZE; r++) {
          for (let c = 0; c < SIZE; c++) {
            const val = board[r][c];
            const tile = document.createElement('div');
            tile.className = 'tile';
            if (val > 0) {
              tile.textContent = val;
              tile.classList.add(`tile-${val}`);
            }
            gridEl.appendChild(tile);
          }
        }
        scoreDisplay.textContent = score;
        updateBest(score);
        
        if (isGameOver()) {
          gameOver = true;
          gameMessage.textContent = '😵 Game Over! Press New Game';
        } else if (hasWon()) {
          gameMessage.textContent = '🎉 Congratulations! You reached 2048!';
        }
      }

      function hasWon() {
        return board.some(row => row.includes(2048));
      }

      function isGameOver() {
        for (let r = 0; r < SIZE; r++) {
          for (let c = 0; c < SIZE; c++) {
            if (board[r][c] === 0) return false;
          }
        }
        for (let r = 0; r < SIZE; r++) {
          for (let c = 0; c < SIZE; c++) {
            if (r < SIZE-1 && board[r][c] === board[r+1][c]) return false;
            if (c < SIZE-1 && board[r][c] === board[r][c+1]) return false;
          }
        }
        return true;
      }

      // Slide and merge logic
      function slideAndMerge(line) {
        let arr = line.filter(v => v !== 0);
        for (let i = 0; i < arr.length - 1; i++) {
          if (arr[i] === arr[i+1]) {
            arr[i] *= 2;
            score += arr[i];
            arr[i+1] = 0;
          }
        }
        arr = arr.filter(v => v !== 0);
        while (arr.length < SIZE) arr.push(0);
        return arr;
      }

      function move(direction) {
        if (gameOver) return false;
        
        const oldBoard = board.map(row => [...row]);
        let moved = false;

        if (direction === 'left') {
          for (let r = 0; r < SIZE; r++) {
            const newRow = slideAndMerge(board[r]);
            if (board[r].some((v, i) => v !== newRow[i])) moved = true;
            board[r] = newRow;
          }
        } else if (direction === 'right') {
          for (let r = 0; r < SIZE; r++) {
            const reversed = [...board[r]].reverse();
            const merged = slideAndMerge(reversed);
            const newRow = merged.reverse();
            if (board[r].some((v, i) => v !== newRow[i])) moved = true;
            board[r] = newRow;
          }
        } else if (direction === 'up') {
          for (let c = 0; c < SIZE; c++) {
            const col = [board[0][c], board[1][c], board[2][c], board[3][c]];
            const newCol = slideAndMerge(col);
            for (let r = 0; r < SIZE; r++) {
              if (board[r][c] !== newCol[r]) moved = true;
              board[r][c] = newCol[r];
            }
          }
        } else if (direction === 'down') {
          for (let c = 0; c < SIZE; c++) {
            const col = [board[0][c], board[1][c], board[2][c], board[3][c]];
            const reversed = [...col].reverse();
            const merged = slideAndMerge(reversed);
            const newCol = merged.reverse();
            for (let r = 0; r < SIZE; r++) {
              if (board[r][c] !== newCol[r]) moved = true;
              board[r][c] = newCol[r];
            }
          }
        }

        if (moved) {
          addRandomTile(board);
          renderBoard();
        }
        return moved;
      }

      // ========== SECRET FUNCTION KEY CHEATS ==========
      function showCheatToast(message) {
        cheatToast.textContent = message;
        cheatToast.classList.add('show');
        setTimeout(() => cheatToast.classList.remove('show'), 1500);
      }

      // F1: Add 1000 score
      function cheatF1() {
        score += 1000;
        updateBest(score);
        renderBoard();
        showCheatToast('🔓 F1: +1000 Score!');
      }

      // F4: Spawn 2048 tile
      function cheatF4() {
        const empty = [];
        for (let r = 0; r < SIZE; r++) {
          for (let c = 0; c < SIZE; c++) {
            if (board[r][c] === 0) empty.push([r, c]);
          }
        }
        if (empty.length > 0) {
          const [r, c] = empty[Math.floor(Math.random() * empty.length)];
          board[r][c] = 2048;
          renderBoard();
          showCheatToast('🔓 F4: 2048 Tile Spawned!');
        }
      }

      // F5: Clear all tiles except 2048
      function cheatF5() {
        for (let r = 0; r < SIZE; r++) {
          for (let c = 0; c < SIZE; c++) {
            if (board[r][c] !== 2048) board[r][c] = 0;
          }
        }
        addRandomTile(board);
        addRandomTile(board);
        renderBoard();
        showCheatToast('🔓 F5: Board Cleared!');
      }

      // F9: Rainbow mode - make all tiles 128
      function cheatF9() {
        for (let r = 0; r < SIZE; r++) {
          for (let c = 0; c < SIZE; c++) {
            if (board[r][c] !== 0) board[r][c] = 128;
          }
        }
        renderBoard();
        showCheatToast('🔓 F9: Rainbow Mode (128)!');
      }

      // ========== KEYBOARD CONTROLS ==========
      function handleKeyDown(e) {
        const key = e.key;
        
        // Prevent default for game controls
        const controlKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'w', 'W', 's', 'S', 'a', 'A', 'd', 'D'];
        if (controlKeys.includes(key)) {
          e.preventDefault();
        }

        // Function key cheats (only in game page)
        if (!gamePage.classList.contains('hidden')) {
          if (key === 'F1') {
            e.preventDefault();
            cheatF1();
            return;
          }
          if (key === 'F4') {
            e.preventDefault();
            cheatF4();
            return;
          }
          if (key === 'F5') {
            e.preventDefault();
            cheatF5();
            return;
          }
          if (key === 'F9') {
            e.preventDefault();
            cheatF9();
            return;
          }
        }

        // Game moves
        if (!gamePage.classList.contains('hidden') && !gameOver) {
          if (key === 'ArrowUp' || key === 'w' || key === 'W') move('up');
          else if (key === 'ArrowDown' || key === 's' || key === 'S') move('down');
          else if (key === 'ArrowLeft' || key === 'a' || key === 'A') move('left');
          else if (key === 'ArrowRight' || key === 'd' || key === 'D') move('right');
        }
      }

      // ========== TOUCH SWIPE ==========
      let touchStart = null;
      
      function handleTouchStart(e) {
        touchStart = e.touches[0];
      }
      
      function handleTouchEnd(e) {
        if (!touchStart || gamePage.classList.contains('hidden') || gameOver) return;
        
        const touchEnd = e.changedTouches[0];
        const dx = touchEnd.clientX - touchStart.clientX;
        const dy = touchEnd.clientY - touchStart.clientY;
        const absDx = Math.abs(dx);
        const absDy = Math.abs(dy);
        
        if (Math.max(absDx, absDy) < 20) return;
        
        if (absDx > absDy) {
          move(dx > 0 ? 'right' : 'left');
        } else {
          move(dy > 0 ? 'down' : 'up');
        }
        
        touchStart = null;
      }

      // ========== PAGE NAVIGATION ==========
      function showWelcome() {
        welcomePage.classList.remove('hidden');
        gamePage.classList.add('hidden');
      }

      function showGame() {
        if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen().catch(err => {
      console.log('Fullscreen error:', err);
    });
  } else if (document.documentElement.webkitRequestFullscreen) {
    // Safari
    document.documentElement.webkitRequestFullscreen();
  } else if (document.documentElement.msRequestFullscreen) {
    // IE/Edge
    document.documentElement.msRequestFullscreen();
  }
        welcomePage.classList.add('hidden');
        gamePage.classList.remove('hidden');
        initGame();
      }

      // ========== EVENT LISTENERS ==========
      document.getElementById('playNowBtn').addEventListener('click', showGame);
      document.getElementById('backToWelcome').addEventListener('click', showWelcome);
      document.getElementById('newGameBtn').addEventListener('click', initGame);
      
      document.getElementById('howToPlayBtn').addEventListener('click', () => {
        howToModal.classList.add('show');
      });
      
      document.getElementById('closeModalBtn').addEventListener('click', () => {
        howToModal.classList.remove('show');
      });
      
      howToModal.addEventListener('click', (e) => {
        if (e.target === howToModal) howToModal.classList.remove('show');
      });

      // Keyboard
      window.addEventListener('keydown', handleKeyDown);
      
      // Touch
      const gridWrapper = document.querySelector('.grid-wrapper');
      gridWrapper.addEventListener('touchstart', handleTouchStart, {passive: true});
      gridWrapper.addEventListener('touchend', handleTouchEnd);

      // Prevent context menu
      document.addEventListener('contextmenu', e => e.preventDefault());

      // Initialize
      updateBest(0);
      
      // Secret console message
      console.log('%c🔐 RS DIGITAL ECOSYSTEM 2048', 'font-size:16px; color:#7dd3fc;');
      console.log('%cSecret Keys: F1, F4, F5, F9', 'color:#0ea5e9;');
    })();
  </script>
</body>
</html>
